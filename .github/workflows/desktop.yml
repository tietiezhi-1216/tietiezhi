name: CI (Desktop · Tauri)

# 桌面客户端（desktop/）的持续集成：Windows + macOS 双平台
# typecheck + Rust 测试 + tauri build（暂不签名/公证，产物仅供构建验证）。
on:
  push:
    branches: [main]
    paths: ['desktop/**', '.github/workflows/desktop.yml']
  pull_request:
    branches: [main]
    paths: ['desktop/**', '.github/workflows/desktop.yml']
  workflow_dispatch:

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            bundles: app,dmg
          - platform: windows
            os: windows-latest
            bundles: nsis
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      # pnpm 版本取自 desktop/package.json 的 packageManager 字段
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: desktop/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck (tsc --noEmit)
        run: pnpm typecheck

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Tauri build
        run: pnpm tauri build --bundles ${{ matrix.bundles }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: tietiezhi-desktop-${{ matrix.platform }}
          path: |
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
