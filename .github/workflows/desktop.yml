name: CI (Desktop · Tauri)

# 桌面客户端（desktop/）的持续集成：Windows + macOS 双平台
# typecheck + Rust 测试 + tauri build。
# macOS 签名 + 公证：配齐 APPLE_* secrets 后 tauri build 自动签名 → 公证 → 装订；未配置则回退 ad-hoc。
on:
  push:
    branches: [main]
    paths: ['desktop/**', '.github/workflows/desktop.yml']
  pull_request:
    branches: [main]
    paths: ['desktop/**', '.github/workflows/desktop.yml']
  workflow_dispatch:

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            bundles: app,dmg
          - platform: windows
            os: windows-latest
            bundles: nsis
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      # pnpm 版本取自 desktop/package.json 的 packageManager 字段
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: desktop/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck (tsc --noEmit)
        run: pnpm typecheck

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Tauri build
        env:
          # macOS 签名 + 公证：配齐下列 secrets 后 tauri build 自动签名 → 公证 → 装订；
          # 未配置（值为空）时回退 ad-hoc（当前行为）。Windows 构建忽略这些变量。
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # 应用内更新（tauri updater）产物签名：私钥 + 密码（minisign）。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles ${{ matrix.bundles }}

      # Tauri 只公证并装订了 .app，未公证外层 dmg（下载 dmg 仍会被 Gatekeeper 拦）。
      # 这里对 dmg 单独公证 + 装订，实现「下载 dmg 即开、零警告」。未配公证凭据则跳过。
      - name: Notarize & staple DMG (macOS)
        if: matrix.platform == 'macos'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_ID" ]; then echo "未配置公证凭据，跳过 dmg 公证"; exit 0; fi
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          [ -z "$DMG" ] && { echo "未找到 dmg，跳过"; exit 0; }
          echo "公证 dmg: $DMG"
          xcrun notarytool submit "$DMG" --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      # updater 产物：macOS 为 *.app.tar.gz(+.sig)，Windows 直接复用 nsis exe(+.sig)。
      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: tietiezhi-desktop-${{ matrix.platform }}
          path: |
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/nsis/*.exe.sig
          if-no-files-found: error
