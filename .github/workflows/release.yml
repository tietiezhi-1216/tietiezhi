name: Release

# 仅在推送 v* tag（或手动 workflow_dispatch 指定版本）时触发：构建 release、
# 用 Developer ID 签名 + 硬化运行时、打成 DMG、公证并 staple、创建 GitHub Release
# 并上传产物 + SHA256 + 更新清单。
#
# 签名/公证需要以下 GitHub secrets（缺失则回退 ad-hoc，仅供内部测试，装机每次都要重新授权）：
#   MACOS_CERT_P12_BASE64   Developer ID Application 证书导出的 .p12，base64 编码
#   MACOS_CERT_PASSWORD     导出 .p12 时设的密码
#   MACOS_NOTARY_APPLE_ID   公证用的 Apple ID（邮箱）
#   MACOS_NOTARY_PASSWORD   该 Apple ID 的 App 专用密码（appleid.apple.com 生成）
#   MACOS_NOTARY_TEAM_ID    团队 ID（如 LQ97GA8LY8）
# 详见 docs/RELEASE_SIGNING.md。
on:
  # 旧的 Swift macOS 版（apple/），Flutter 全端主线用 v* 后，这里改用 apple-v* 触发以解耦。
  push:
    tags: ['apple-v*']
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 0.0.1）'
        required: true

permissions:
  contents: write          # 创建 Release / 上传产物需要写权限

jobs:
  release:
    name: Build & publish (macOS · Developer ID)
    runs-on: macos-latest
    env:
      # 一处判断是否具备签名条件，后续步骤据此 gate。
      SIGNING_AVAILABLE: ${{ secrets.MACOS_CERT_P12_BASE64 != '' }}
      NOTARIZE_AVAILABLE: ${{ secrets.MACOS_NOTARY_PASSWORD != '' }}
    defaults:
      run:
        working-directory: apple      # macOS app lives under apple/ since the platform split
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#apple-v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V"   >> "$GITHUB_OUTPUT"

      - name: Verify Info.plist version
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          PATCH="${VERSION##*.}"
          PLIST_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Info.plist)"
          PLIST_BUILD="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' Info.plist)"
          if [ "$PLIST_VERSION" != "$VERSION" ]; then
            echo "::error::Info.plist version $PLIST_VERSION does not match release $VERSION"
            exit 1
          fi
          if [ "$PLIST_BUILD" != "$PATCH" ]; then
            echo "::warning::Info.plist build $PLIST_BUILD does not match patch number $PATCH"
          fi

      - name: Build release bundle
        run: ./build.sh release

      # Re-sign the assembled bundle with the Developer ID identity + Hardened
      # Runtime + entitlements, overriding build.sh's ad-hoc signature. TCC binds
      # the grant to this signature; a constant Team ID + bundle id keeps the grant
      # across every future update.
      - name: Sign app (Developer ID)
        if: env.SIGNING_AVAILABLE == 'true'
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          APP="$(swift build -c release --show-bin-path)/Tietiezhi.app"

          KEYCHAIN="$RUNNER_TEMP/tietiezhi-signing.keychain-db"
          KP="tietiezhi-ci-$RANDOM"
          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" "$(security default-keychain | tr -d ' "')"

          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KP" "$KEYCHAIN" >/dev/null

          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | grep 'Developer ID Application' | head -1 | awk -F'"' '{print $2}')"
          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in the imported cert."
            exit 1
          fi
          echo "Signing with: $IDENTITY"

          codesign --force --options runtime --timestamp \
            --entitlements Tietiezhi.entitlements \
            --sign "$IDENTITY" --identifier com.Tietiezhi.app "$APP"
          codesign --verify --strict --verbose=2 "$APP"
          codesign -dvv "$APP" 2>&1 | head -n 8

          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Package .app → dmg
        id: pkg
        run: |
          BIN="$(swift build -c release --show-bin-path)"
          APP="$BIN/Tietiezhi.app"
          ARCH="$(uname -m)"
          VER="${{ steps.ver.outputs.version }}"
          DMG="Tietiezhi-${VER}-macos-${ARCH}.dmg"
          STAGE="$(mktemp -d)/Tietiezhi"
          mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"          # drag-to-install target
          hdiutil create -volname "Tietiezhi ${VER}" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

      # Submit the DMG to Apple, wait for the ticket, then staple it so Gatekeeper
      # clears the download offline. Stapling rewrites the DMG, so the checksum +
      # manifest are computed AFTER this step.
      - name: Notarize & staple DMG
        if: env.SIGNING_AVAILABLE == 'true' && env.NOTARIZE_AVAILABLE == 'true'
        env:
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        run: |
          set -euo pipefail
          DMG="${{ steps.pkg.outputs.dmg }}"
          xcrun notarytool submit "$DMG" \
            --apple-id "$MACOS_NOTARY_APPLE_ID" \
            --password "$MACOS_NOTARY_PASSWORD" \
            --team-id "$MACOS_NOTARY_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Checksum + update manifest
        id: manifest
        run: |
          VER="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          DMG="${{ steps.pkg.outputs.dmg }}"
          shasum -a 256 "$DMG" | tee "$DMG.sha256"
          SHA="$(cut -d ' ' -f 1 "$DMG.sha256")"
          MANIFEST="Tietiezhi-${VER}-update.json"
          cat > "$MANIFEST" <<EOF
          {
            "version": "$VER",
            "tag": "$TAG",
            "minimumSystemVersion": "14.0",
            "architecture": "$(uname -m)",
            "asset": "$DMG",
            "sha256": "$SHA",
            "downloadURL": "https://github.com/${{ github.repository }}/releases/download/$TAG/$DMG"
          }
          EOF
          cat "$MANIFEST"
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Tietiezhi ${{ steps.ver.outputs.version }}
          body_path: .github/RELEASE_NOTES.md
          prerelease: true
          # Artifacts are produced under apple/ (job working-directory); action-gh-release
          # resolves file globs from the workspace ROOT, so prefix them explicitly.
          files: |
            apple/${{ steps.pkg.outputs.dmg }}
            apple/${{ steps.pkg.outputs.dmg }}.sha256
            apple/${{ steps.manifest.outputs.manifest }}
