name: CI (Server · Go)

# 万物互联 Go 后端（server/）的持续集成：编译 + 单元/集成测试（含 interconnect hub）。
# 只在触及 server/ 时触发。Web 控制台不在此构建——dist/ 有占位符，go:embed 可直接编译。
on:
  push:
    branches: [main]
    paths: ['server/**', '.github/workflows/server-ci.yml']
  pull_request:
    branches: [main]
    paths: ['server/**', '.github/workflows/server-ci.yml']
  workflow_dispatch:

concurrency:
  group: server-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum

      - name: Vet
        run: go vet ./...

      - name: Build single binary
        run: go build -o bin/tietiezhi ./cmd/server

      - name: Test (with race detector)
        run: go test -race ./...
