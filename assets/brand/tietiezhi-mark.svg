<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">Tietiezhi</title>
  <desc id="d">铁铁汁 octopus mark — one core with eight tentacles reaching to connected devices (万物互联).</desc>
  <defs>
    <linearGradient id="tz-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="tz-body" x1="140" y1="120" x2="372" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E6F7FF"/>
    </linearGradient>
    <radialGradient id="tz-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 236) scale(180)">
      <stop stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded app-icon field -->
  <rect width="512" height="512" rx="116" fill="url(#tz-bg)"/>
  <circle cx="256" cy="236" r="180" fill="url(#tz-glow)"/>

  <!-- connection nodes at tentacle tips (万物互联) -->
  <g fill="#FFE08A">
    <circle cx="96"  cy="392" r="13"/>
    <circle cx="168" cy="430" r="13"/>
    <circle cx="228" cy="446" r="13"/>
    <circle cx="284" cy="446" r="13"/>
    <circle cx="344" cy="430" r="13"/>
    <circle cx="416" cy="392" r="13"/>
    <circle cx="140" cy="360" r="11" opacity="0.9"/>
    <circle cx="372" cy="360" r="11" opacity="0.9"/>
  </g>

  <!-- octopus: head/mantle + eight tentacles -->
  <g fill="url(#tz-body)">
    <!-- eight tentacles fanning to the nodes -->
    <path d="M256 300 C 205 322 150 356 96 392 C 132 372 176 356 214 350 C 200 336 210 316 256 300 Z"/>
    <path d="M256 300 C 220 330 190 392 168 430 C 190 392 216 366 236 356 C 224 340 232 320 256 300 Z"/>
    <path d="M256 302 C 240 340 232 404 228 446 C 240 404 250 372 256 358 C 262 372 272 404 284 446 C 280 404 272 340 256 302 Z"/>
    <path d="M256 300 C 292 330 322 392 344 430 C 322 392 296 366 276 356 C 288 340 280 320 256 300 Z"/>
    <path d="M256 300 C 307 322 362 356 416 392 C 380 372 336 356 298 350 C 312 336 302 316 256 300 Z"/>
  </g>

  <!-- mantle (head) -->
  <path d="M256 96 C 330 96 388 152 388 232 C 388 292 352 330 320 344 C 300 352 212 352 192 344 C 160 330 124 292 124 232 C 124 152 182 96 256 96 Z" fill="url(#tz-body)"/>

  <!-- eyes -->
  <g>
    <circle cx="212" cy="232" r="30" fill="#1E293B"/>
    <circle cx="300" cy="232" r="30" fill="#1E293B"/>
    <circle cx="222" cy="222" r="9" fill="#FFFFFF"/>
    <circle cx="310" cy="222" r="9" fill="#FFFFFF"/>
  </g>
  <!-- subtle smile -->
  <path d="M232 286 Q 256 306 280 286" stroke="#94A3B8" stroke-width="7" stroke-linecap="round" fill="none"/>
</svg>
