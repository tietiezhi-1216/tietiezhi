# tietiezhi 配置文件
# 中文注释，配置即文档

# 服务器配置
server:
  host: "0.0.0.0"
  port: 18178

# LLM 配置
llm:
  provider: "openai"            # 目前仅支持 openai
  base_url: "https://api.openai.com/v1"  # API 基础地址，可替换为兼容接口
  api_key: "sk-your-api-key"    # 你的 API Key
  model: "gpt-4o"              # 默认模型

# Agent 配置
agent:
  max_tool_calls: 20            # 单次对话最大工具调用次数
  system_prompt: "你是一个有用的AI助手"  # 默认系统提示词
  loop_detection: true          # 启用工具调用循环检测

# 渠道配置
channels:
  feishu:
    enabled: false              # 是否启用飞书渠道
    app_id: ""                  # 飞书应用 ID
    app_secret: ""              # 飞书应用 Secret
    verification_token: ""      # 事件订阅验证 Token
    encrypt_key: ""             # 事件订阅加密 Key

# 记忆配置
memory:
  type: "markdown"              # 记忆类型：markdown
  path: "./workspaces"          # 记忆文件目录

# 技能配置
skills:
  path: "./skills"              # 技能包目录

# 定时任务配置
scheduler:
  enabled: false                # 是否启用定时任务

# 日志配置
log:
  level: "info"                 # 日志级别：debug, info, warn, error
  format: "text"                # 日志格式：json, text

# 会话配置
session:
  max_history_turns: 20         # 最大历史轮数
  persist_path: "./data/sessions"  # 会话持久化目录
  auto_save_seconds: 60         # 自动保存间隔

# 定时任务配置（详细）
scheduler:
  enabled: false
  path: "./data/cron"           # 任务存储路径
  exec_timeout: 300             # 执行超时（秒）

# 心跳配置
heartbeat:
  enabled: false
  interval: 30                  # 检查间隔（分钟，最小5）
  chat_id: ""                   # 投递目标飞书聊天ID（可选）

# Hook 配置
hooks:
  enabled: false
  rules: []
  # - event: pre_tool_use       # 事件类型
  #   matcher: "memory_*"       # 工具名匹配（可选，通配符）
  #   type: command             # command / script
  #   command: "python3 validate.py"
  #   timeout: 5

# 子代理配置
subagent:
  enabled: true
  path: "./data/subagents"
  timeout: 300                  # 默认超时（秒）
