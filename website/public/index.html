<!DOCTYPE html>

    <section id="top" class="absolute inset-0 z-[5] mx-auto flex h-full w-full max-w-7xl flex-col items-center px-5 pt-28 text-center md:pt-24">

        <a id="dlMacArm" href="#" class="group flex min-h-20 flex-1 items-center gap-4 rounded-[1.75rem] border border-white/20 bg-white/[.08] px-5 py-4 text-left shadow-[inset_0_1px_0_rgba(255,255,255,.18),0_22px_60px_rgba(0,0,0,.4)] backdrop-blur-2xl transition duration-300 hover:-translate-y-1 hover:border-white/35 hover:bg-white/[.14] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#8bdfff]">
          <span class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl border border-white/15 bg-black/30 shadow-[inset_0_1px_0_rgba(255,255,255,.1)]">
            <img src="dist/assets/logos/Apple.svg" alt="" aria-hidden="true" class="h-5 w-5 object-contain opacity-90 invert transition group-hover:opacity-100" />
          </span>
          <span class="min-w-0">
            <span class="block text-[10px] font-semibold uppercase tracking-[.22em] text-white/45">Universal DMG</span>
            <span class="mt-1 block text-base font-semibold text-white">下载 macOS</span>

        <a id="dlWin" href="#" class="group flex min-h-20 flex-1 items-center gap-4 rounded-[1.75rem] border border-white/20 bg-white/[.08] px-5 py-4 text-left shadow-[inset_0_1px_0_rgba(255,255,255,.18),0_22px_60px_rgba(0,0,0,.4)] backdrop-blur-2xl transition duration-300 hover:-translate-y-1 hover:border-white/35 hover:bg-white/[.14] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#8bdfff]">

            <span class="mt-1 block text-base font-semibold text-white">下载 Windows</span>

      <p id="dlHint" class="sr-only"></p>

</html>
