<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="app.js" defer></script>
</head>
<body class="bg-black font-montserrat text-white antialiased selection:bg-[#7657ff] selection:text-white">
  <main class="relative h-screen overflow-hidden bg-black">
    <img src="dist/assets/hero/tietiezhi-glass-octopus.png" alt="Tietiezhi 玻璃章鱼形象" class="absolute inset-0 h-full w-full object-cover object-center" />
    <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-black/55"></div>
    <img src="dist/assets/hero/tietiezhi-starfield.png" alt="" aria-hidden="true" class="pointer-events-none absolute -inset-[6%] z-[2] h-[112%] w-[112%] object-cover opacity-55 mix-blend-screen motion-safe:animate-star-drift motion-reduce:opacity-35" />
    <img src="dist/assets/hero/tietiezhi-starfield.png" alt="" aria-hidden="true" class="pointer-events-none absolute -inset-[12%] z-[2] h-[124%] w-[124%] rotate-180 object-cover opacity-25 mix-blend-screen motion-safe:animate-star-drift-reverse motion-reduce:hidden" />
    <img src="dist/assets/hero/tietiezhi-light-beam.png" alt="" aria-hidden="true" class="pointer-events-none absolute inset-y-0 left-0 z-[3] h-full w-64 object-cover opacity-0 mix-blend-screen motion-safe:animate-page-sweep motion-reduce:hidden md:w-96" />

    <header class="relative z-10 flex items-center justify-between px-6 py-6 md:px-12 md:py-9">
      <a href="#top" aria-label="Tietiezhi 首页" class="block rounded-xl transition hover:scale-105 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-white/60">
        <img src="dist/assets/tietiezhi-mark-transparent.png" alt="Tietiezhi" class="h-12 w-12 object-contain drop-shadow-[0_8px_24px_rgba(77,221,255,.25)] md:h-14 md:w-14" />
      </a>
      <a href="https://github.com/tietiezhi-1216/tietiezhi" class="rounded-full border border-white/15 bg-black/20 px-5 py-2.5 text-sm font-semibold backdrop-blur-xl transition hover:bg-white/10">GitHub</a>
    </header>

    <section id="top" class="absolute inset-0 z-[5] mx-auto flex h-full w-full max-w-7xl flex-col items-center px-5 pt-28 text-center md:pt-24">
      <p class="text-[11px] font-semibold uppercase tracking-[.3em] text-white/45 sm:text-xs">Latest / <span id="dlVersion">Version</span></p>
      <div class="relative mt-5">
        <h1 class="text-[2.1rem] font-bold leading-none tracking-[-.055em] text-white drop-shadow-[0_10px_36px_rgba(0,0,0,.7)] sm:text-5xl md:text-[5rem]">Tietiezhi Desktop</h1>
        <span aria-hidden="true" class="pointer-events-none absolute inset-0 bg-[linear-gradient(105deg,transparent_0%,transparent_38%,#8bdfff_47%,#ffffff_52%,#d9c7ff_57%,transparent_66%,transparent_100%)] bg-[length:250%_100%] bg-clip-text text-[2.1rem] font-bold leading-none tracking-[-.055em] text-transparent motion-safe:animate-title-shine motion-reduce:hidden sm:text-5xl md:text-[5rem]">Tietiezhi Desktop</span>
      </div>
      <p class="mt-5 text-xs font-medium tracking-[.08em] text-white/45 sm:text-sm">Available on macOS and Windows</p>

      <div id="download" class="absolute bottom-12 left-1/2 flex w-[calc(100%-2.5rem)] max-w-xl -translate-x-1/2 flex-col gap-2 rounded-[2rem] border border-white/15 bg-black/35 p-2 shadow-[0_28px_80px_rgba(0,0,0,.45)] backdrop-blur-2xl sm:flex-row">
        <a id="dlMacArm" href="#" class="flex-1 rounded-[1.5rem] bg-white px-6 py-4 font-semibold text-black transition hover:bg-[#e8faff] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#8bdfff]">下载 macOS</a>
        <a id="dlWin" href="#" class="flex-1 rounded-[1.5rem] px-6 py-4 font-semibold transition hover:bg-white/10 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-white/60">下载 Windows</a>
      </div>

      <a id="dlMacX64" href="#" class="sr-only">下载 Intel Mac</a>
      <span id="dlDate" class="sr-only"></span>
      <p id="dlHint" class="sr-only"></p>
    </section>
  </main>
</body>
</html>
